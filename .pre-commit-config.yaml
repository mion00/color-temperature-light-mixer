# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
#
# This configuration uses local hooks that rely on packages
# installed in the virtual environment (via requirements.txt) or
# via npm (package.json). Run script/setup/bootstrap to install both.
#
# Python hooks use the currently activated virtual environment or fall back
# to the standard location at $HOME/.local/ha-venv.
# Node hooks use ./node_modules/.bin/ (installed via npm install).
#
repos:
  - repo: local
    hooks:
      # Run the Ruff formatter first — format before lint (clean slate for linter)
      - id: ruff-format
        name: ruff format
        entry: bash -c 'if command -v ruff &>/dev/null; then ruff format "$@"; exit $?; fi; for venv in "$HOME/.local/ha-venv" ".local/ha-venv"; do if [[ -f "$venv/bin/ruff" ]]; then source "$venv/bin/activate" 2>/dev/null || true; ruff format "$@"; exit $?; fi; done; echo "⚠️  Skipping ruff format (venv not ready)"; exit 0' --
        language: system
        types: [python]
        require_serial: true
        pass_filenames: true

      # Run the Ruff linter with auto-fix after formatting
      - id: ruff
        name: ruff
        entry: bash -c 'if command -v ruff &>/dev/null; then ruff check --fix --exit-non-zero-on-fix "$@"; exit $?; fi; for venv in "$HOME/.local/ha-venv" ".local/ha-venv"; do if [[ -f "$venv/bin/ruff" ]]; then source "$venv/bin/activate" 2>/dev/null || true; ruff check --fix --exit-non-zero-on-fix "$@"; exit $?; fi; done; echo "⚠️  Skipping ruff (venv not ready)"; exit 0' --
        language: system
        types: [python]
        require_serial: true
        pass_filenames: true

      # YAML linting
      - id: yamllint
        name: yamllint
        entry: bash -c 'if command -v yamllint &>/dev/null; then yamllint -c .yamllint.yml "$@"; exit $?; fi; for venv in "$HOME/.local/ha-venv" ".local/ha-venv"; do if [[ -f "$venv/bin/yamllint" ]]; then source "$venv/bin/activate" 2>/dev/null || true; yamllint -c .yamllint.yml "$@"; exit $?; fi; done; echo "⚠️  Skipping yamllint (venv not ready)"; exit 0' --
        language: system
        types: [yaml]
        files: ^(custom_components/color_temperature_light_mixer/|schemas/yaml/|\.github/|\.pre-commit-config\.yaml|\.prettierrc\.yml)
        pass_filenames: true

      # Shell script linting
      - id: shellcheck
        name: shellcheck
        entry: shellcheck -x
        language: system
        types: [shell]
        files: ^(script/|\.devcontainer/)
        pass_filenames: true

      # Shell script formatting
      - id: shfmt
        name: shfmt
        entry: shfmt -i 4 -w
        language: system
        types: [shell]
        files: ^(script/|\.devcontainer/)
        pass_filenames: true

      # Markdown formatting with Prettier
      - id: prettier-markdown
        name: prettier (markdown)
        entry: bash -c 'if [[ -x "./node_modules/.bin/prettier" ]]; then ./node_modules/.bin/prettier --write "$@"; exit $?; fi; echo "⚠️  Skipping prettier (npm not ready)"; exit 0' --
        language: system
        types: [markdown]
        pass_filenames: true

      # Markdown linting with markdownlint-cli2
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: bash -c 'if [[ -x "./node_modules/.bin/markdownlint-cli2" ]]; then ./node_modules/.bin/markdownlint-cli2 --fix "$@"; exit $?; fi; echo "⚠️  Skipping markdownlint-cli2 (npm not ready)"; exit 0' --
        language: system
        types: [markdown]
        pass_filenames: true

      # Spell checking
      - id: codespell
        name: codespell
        entry: bash -c 'if command -v codespell &>/dev/null; then codespell --ignore-words-list=aiport,astroid,checkin,currenty,hass,iif,incomfort,lookin,nam,NotIn --skip="./.*,*.csv,*.json,*.ambr,uv.lock" --quiet-level=2 "$@"; exit $?; fi; for venv in "$HOME/.local/ha-venv" ".local/ha-venv"; do if [[ -f "$venv/bin/codespell" ]]; then source "$venv/bin/activate" 2>/dev/null || true; codespell --ignore-words-list=aiport,astroid,checkin,currenty,hass,iif,incomfort,lookin,nam,NotIn --skip="./.*,*.csv,*.json,*.ambr,uv.lock" --quiet-level=2 "$@"; exit $?; fi; done; echo "⚠️  Skipping codespell (venv not ready)"; exit 0' --
        language: system
        types_or: [python, markdown, rst]
        exclude_types: [csv, json, html]
        files: ^(custom_components/|tests/|script/|README\.md|CONTRIBUTING\.md|DEPENDENCIES\.md)
        pass_filenames: true

      # yamllint disable rule:comments-indentation
      # Type checking with Pyright (optional, can be slow)
      # Uncomment to enable in pre-commit (recommended to use in IDE instead)
      # - id: pyright
      #   name: pyright
      #   entry: bash -c '"$HOME/.local/ha-venv/bin/pyright" "$@"' --
      #   language: system
      #   types: [python]
      #   pass_filenames: true
      #   # Run manually with: pre-commit run pyright --all-files
      #   stages: [manual]
      # yamllint enable rule:comments-indentation
